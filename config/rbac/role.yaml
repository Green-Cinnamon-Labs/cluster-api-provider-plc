---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - infrastructure.greenlabs.io
  resources:
  - plcmachines
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - infrastructure.greenlabs.io
  resources:
  - plcmachines/finalizers
  verbs:
  - update
- apiGroups:
  - infrastructure.greenlabs.io
  resources:
  - plcmachines/status
  verbs:
  - get
  - patch
  - update
