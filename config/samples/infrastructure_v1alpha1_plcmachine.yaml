apiVersion: infrastructure.greenlabs.io/v1alpha1
kind: PLCMachine
metadata:
  labels:
    app.kubernetes.io/name: cluster-api-provider-plc
    app.kubernetes.io/managed-by: kustomize
  name: tep-baseline
spec:
  plantAddress: "te-plant.default.svc:50051"

  # Politica de controle: parametros desejados para controladores que
  # JA EXISTEM na planta. O operator nao cria controllers — so ajusta.
  # Campos nil = "nao mexe nesse parametro".
  controllers:
    - id: pressure_reactor
      kp: 0.1
      setpoint: 2705.0
      bias: 40.06

    - id: level_separator
      kp: 1.0
      setpoint: 50.0
      bias: 38.1

    - id: level_stripper
      kp: 1.0
      setpoint: 50.0
      bias: 46.5

  # Baseline: sem disturbios
  disturbances: []
