---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: plcmachines.infrastructure.greenlabs.io
spec:
  group: infrastructure.greenlabs.io
  names:
    kind: PLCMachine
    listKind: PLCMachineList
    plural: plcmachines
    singular: plcmachine
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.plantAddress
      name: Plant
      type: string
    - format: float
      jsonPath: .status.plantTime
      name: Time (h)
      type: number
    - jsonPath: .status.isdActive
      name: ISD
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PLCMachine is the Schema for the plcmachines API.
          It represents a supervisory connection to a TEP plant running as a gRPC
          service. The spec declares a control POLICY — target parameters for
          controllers that already exist on the plant. The status reflects the
          actual plant state observed via gRPC streaming. The reconciler closes
          the gap between spec (desired) and status (actual) by adjusting parameters.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of PLCMachine
            properties:
              controllers:
                description: |-
                  controllers lists the desired parameters for controllers that already
                  exist on the plant. The operator does not create controllers — it reads
                  what the plant has via ListControllers and adjusts to match this policy.
                items:
                  description: |-
                    ControllerPolicy defines the desired parameters for a controller that
                    ALREADY EXISTS on the plant. The operator does not create or remove
                    controllers — it only adjusts parameters of existing ones via gRPC.
                  properties:
                    bias:
                      description: bias is the desired steady-state output offset.
                      type: number
                    enabled:
                      description: enabled sets whether this loop should be active.
                        Nil = don't change.
                      type: boolean
                    id:
                      description: |-
                        id matches the controller ID on the plant (e.g. "pressure_reactor").
                        Must correspond to an existing controller returned by ListControllers.
                      type: string
                    kd:
                      description: kd is the desired derivative gain.
                      type: number
                    ki:
                      description: ki is the desired integral gain.
                      type: number
                    kp:
                      description: kp is the desired proportional gain.
                      type: number
                    setpoint:
                      description: setpoint is the desired target value for the process
                        variable.
                      type: number
                  required:
                  - id
                  type: object
                type: array
              disturbances:
                description: |-
                  disturbances lists IDV channels (1-20) to activate.
                  Any channel not listed is deactivated. Empty = baseline (no disturbances).
                items:
                  description: IDVChannel is a TEP disturbance channel number (1-20).
                  format: int32
                  maximum: 20
                  minimum: 1
                  type: integer
                type: array
              metricsIntervalMs:
                default: 1000
                description: |-
                  metricsIntervalMs is how often (ms) the operator polls plant metrics
                  to update .status. Defaults to 1000.
                format: int32
                minimum: 100
                type: integer
              plantAddress:
                description: |-
                  plantAddress is the gRPC endpoint of the plant service
                  (e.g. "te-plant.default.svc:50051").
                type: string
            required:
            - plantAddress
            type: object
          status:
            description: status defines the observed state of PLCMachine
            properties:
              activeDisturbances:
                description: activeDisturbances is the list of IDV channels currently
                  active.
                items:
                  description: IDVChannel is a TEP disturbance channel number (1-20).
                  format: int32
                  maximum: 20
                  minimum: 1
                  type: integer
                type: array
              alarms:
                description: alarms lists active plant alarms.
                items:
                  description: AlarmStatus reports an active plant alarm.
                  properties:
                    active:
                      description: active is true while the alarm condition persists.
                      type: boolean
                    variable:
                      description: variable is the name of the alarmed process variable.
                      type: string
                  required:
                  - active
                  - variable
                  type: object
                type: array
              conditions:
                description: |-
                  conditions are standard Kubernetes status conditions.
                  Types: "Available", "Progressing", "Degraded".
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              controllers:
                description: controllers reports the actual state of each control
                  loop on the plant.
                items:
                  description: ControllerStatus is the observed state of a control
                    loop on the plant.
                  properties:
                    currentMeasurement:
                      description: currentMeasurement is the latest xmeas[xmeasIndex]
                        reading.
                      type: number
                    currentOutput:
                      description: currentOutput is the latest xmv[xmvIndex] value.
                      type: number
                    enabled:
                      description: enabled reflects whether the loop is active on
                        the plant side.
                      type: boolean
                    error:
                      description: error is (currentMeasurement - setpoint). Positive
                        = above target.
                      type: number
                    id:
                      description: id matches ControllerPolicy.ID.
                      type: string
                  required:
                  - enabled
                  - id
                  type: object
                type: array
              derivNorm:
                description: |-
                  derivNorm is the ODE solver derivative norm.
                  When it drops to zero with active alarms, ISD has occurred.
                type: number
              isdActive:
                description: isdActive is true when the plant triggered an emergency
                  shutdown.
                type: boolean
              lastReconcileTime:
                description: lastReconcileTime is when the operator last synced spec
                  to plant.
                format: date-time
                type: string
              phase:
                description: phase summarizes the connection and runtime state.
                enum:
                - Pending
                - Connected
                - Running
                - Degraded
                - Shutdown
                type: string
              plantTime:
                description: plantTime is the current simulation clock in hours.
                type: number
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
